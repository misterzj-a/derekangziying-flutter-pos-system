name: 构建APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 创建签名配置文件
        run: |
          mkdir -p android
          echo "storePassword=test" > android/key.properties
          echo "keyPassword=test" >> android/key.properties
          echo "keyAlias=test" >> android/key.properties
          echo "storeFile=../test.jks" >> android/key.properties

      - name: 创建Firebase配置文件
        run: |
          mkdir -p android/app/src/dev/debug/
          cat > android/app/google-services.json << 'EOF'
{
  "project_info": {
    "project_number": "123456789",
    "project_id": "fake-project-12345",
    "storage_bucket": "fake-project.appspot.com"
  },
  "client": [
    {
      "client_info": {
        "mobilesdk_app_id": "1:123456789:android:abcdef",
        "android_client_info": {
          "package_name": "com.example.app"
        }
      }
    }
  ],
  "configuration_version": "1"
}
EOF
          cp android/app/google-services.json android/app/src/dev/debug/google-services.json || true
          cp android/app/google-services.json android/app/src/debug/google-services.json || true

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: stable

      - name: 安装依赖
        run: flutter pub get

      - name: 打包APK
        run: flutter build apk --debug

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
