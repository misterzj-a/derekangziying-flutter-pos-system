name: 构建APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 创建签名文件（解决第一个报错）
      - name: 创建签名配置 key.properties
        run: |
          mkdir -p android
          echo "storePassword=test" > android/key.properties
          echo "keyPassword=test" >> android/key.properties
          echo "keyAlias=test" >> android/key.properties
          echo "storeFile=../test.jks" >> android/key.properties

      # 2. 创建空的 google-services.json（解决 Firebase 报错）
      - name: 创建空谷歌服务文件
        run: |
          mkdir -p android/app/src/dev/debug/
          cat > android/app/google-services.json << EOF
          {"client":[{"client_info":{"mobilesdk_app_id":"1:1234567890:android:1234","android_client_info":{"package_name":"com.example.app"}}}],"configuration_version":"1"}
          EOF
          cp android/app/google-services.json android/app/src/dev/debug/google-services.json || true
          cp android/app/google-services.json android/app/src/debug/dev/google-services.json || true

      - name: 安装 Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: stable

      - name: 安装依赖
        run: flutter pub get

      # 3. 打包调试APK
      - name: 打包安卓APK
        run: flutter build apk --debug

      # 4. 上传输出
      - name: 上传APK文件
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
