name: 构建APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 🔥 修复关键：自动创建空的 key.properties，解决报错！
      - name: 创建签名配置文件
        run: |
          mkdir -p android
          echo "storePassword=test" > android/key.properties
          echo "keyPassword=test" >> android/key.properties
          echo "keyAlias=test" >> android/key.properties
          echo "storeFile=../test.jks" >> android/key.properties

      # ✅ 新增：自动生成合法的 google-services.json（解决你所有报错）
      - name: 生成合法 google-services.json
        run: |
          cat > android/app/google-services.json << 'EOF'
          {
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:abcdef123456",
                  "android_client_info": {
                    "package_name": "com.example.app"
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: 安装Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.x'
          channel: stable

      - name: 安装依赖
        run: flutter pub get

      - name: 打包APK
        run: flutter build apk --debug

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: flutter-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
