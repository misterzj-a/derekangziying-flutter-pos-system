name: Tests

on:
  push:
    branches:
      - master
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "scripts/**"
      - "mkdocs.yaml"
      - "Makefile"
  pull_request:
  workflow_dispatch:

jobs:
  code-checking:
    name: Check code format and testing
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.head_ref, 'ci/') }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.3"
          cache: true
          channel: "stable"

      - name: Install dependencies
        env:
          GH_READ_PAT: ${{ secrets.GH_READ_PAT }}
        run: |
          git config --global url."https://x-access-token:${GH_READ_PAT}@github.com/".insteadOf "https://github.com/"
          git config --global --add safe.directory /github/workspace
          flutter pub get
          flutter gen-l10n

      - name: Linter
        run: flutter analyze .

      - name: Format
        run: |
          dart format --line-length 120 lib/l10n/gen || true
          dart format --set-exit-if-changed --show none --line-length 120 .

      - name: Testing
        if: github.event_name == 'pull_request'
        run: flutter test

      - name: Testing with Coverage
        if: github.event_name != 'pull_request'
        run: |
          sudo apt-get install -y lcov
          flutter test --coverage
          lcov --remove coverage/lcov.info "lib/l10n/gen/*" -o coverage/lcov.info

      - name: Coverage to codecov
        if: github.event_name != 'pull_request'
        uses: codecov/codecov-action@v4
        with:
          file: coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

      # ======================
      # 👇 这里就是打包 APK
      # ======================
      - name: Build APK
        run: |
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
